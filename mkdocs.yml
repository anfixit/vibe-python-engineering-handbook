site_name: Python Engineering Handbook
site_description: Production-grade Python engineering standards and best practices

theme:
  name: material
  language: ru
  features:
    - content.code.copy # кнопка «копировать» на блоках кода
    - content.code.annotate
    - navigation.sections
    - navigation.top
    - search.suggest
  palette:
    # Переключатель светлой/тёмной темы.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details # сворачиваемые блоки ??? — двухуровневая подача
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Главная: index.md

  - Основы:
      - Стиль кода: style-guide.md
      - Безопасность: security.md
      - Архитектура: architecture.md
      - Асинхронное программирование: async.md

  - Фреймворки:
      - FastAPI: fastapi.md
      - Django / DRF: django.md
      - Aiogram: aiogram.md

  - Инженерные практики:
      - Тестирование: testing.md
      - Git Workflow: git.md
      - HTTP-клиенты: http-clients.md

  - Эксплуатация:
      - Деплой и продакшн: deployment.md
      - Мониторинг: monitoring.md
      - Кеширование: caching.md

  - Проектирование API:
      - Стандартизация API и идемпотентность: api-design.md

  - Инструменты разработки:
      - Tooling: tooling.md
