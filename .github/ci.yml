name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Отменять предыдущие прогоны на той же ветке.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Линтер и форматтер (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установить uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Установить зависимости
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  types:
    name: Проверка типов (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установить uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Установить зависимости
        run: uv sync --frozen
      - name: mypy
        run: uv run mypy src/

  tests:
    name: Тесты и покрытие (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установить uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Установить зависимости
        run: uv sync --frozen
      - name: pytest
        run: uv run pytest --cov=src --cov-report=xml
      - name: Загрузить coverage в Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  audit:
    name: Аудит зависимостей (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установить uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Установить зависимости
        run: uv sync --frozen
      - name: pip-audit
        run: uv run pip-audit
